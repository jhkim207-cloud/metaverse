server:
  port: ${SERVER_PORT:8086}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://168.107.48.28:5432/apps}
    username: ${DB_USERNAME:adxadmin}
    password: ${DB_PASSWORD:nextadx1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
