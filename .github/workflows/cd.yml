name: CD - Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

# 동시 배포 방지
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Backend 빌드 ──
  build-backend:
    name: Build Backend JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/dummy
          DB_USERNAME: dummy
          DB_PASSWORD: dummy

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 5

  # ── Frontend 빌드 ──
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /metaverse-api

      - name: Upload Frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 5

  # ── 서버 배포 ──
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend/

      - name: Download Frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend/

      - name: Create release archive
        run: |
          RELEASE_TAG=$(date -u +"%Y%m%d-%H%M%S")
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

          mkdir -p release-package
          cp artifacts/backend/*.jar release-package/backend.jar
          cp -r artifacts/frontend/ release-package/frontend/
          tar -czf release-${RELEASE_TAG}.tar.gz -C release-package .

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile ~/.ssh/known_hosts\n  ConnectTimeout 10" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Transfer release to server
        run: |
          scp -i ~/.ssh/id_ed25519 -P ${{ secrets.SSH_PORT }} \
            release-${RELEASE_TAG}.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/metaverse/releases/

      - name: Transfer Docker & deploy configs
        run: |
          scp -i ~/.ssh/id_ed25519 -P ${{ secrets.SSH_PORT }} \
            docker/nginx-frontend-metaverse.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/metaverse/docker/

          scp -i ~/.ssh/id_ed25519 -P ${{ secrets.SSH_PORT }} \
            docker/docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/metaverse/docker-compose.prod.yml

          scp -i ~/.ssh/id_ed25519 -P ${{ secrets.SSH_PORT }} \
            scripts/deploy.sh \
            scripts/rollback.sh \
            scripts/health-check.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/metaverse/

          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x /opt/metaverse/deploy.sh /opt/metaverse/rollback.sh /opt/metaverse/health-check.sh"

      - name: Execute deployment
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash /opt/metaverse/deploy.sh ${RELEASE_TAG}"

      - name: Verify deployment
        run: |
          sleep 10

          HEALTH_STATUS=$(ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker exec metaverse-backend wget -qO- http://localhost:8086/api/v1/health 2>/dev/null || echo failed")

          if ! echo "${HEALTH_STATUS}" | grep -q 'status.*ok'; then
            echo "::error::Health check failed! Response: ${HEALTH_STATUS}"
            echo "::error::Triggering rollback..."
            ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "bash /opt/metaverse/rollback.sh"
            exit 1
          fi

          echo "Deployment verified successfully!"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
