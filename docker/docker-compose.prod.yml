# 프로덕션 Docker Compose — nextadx.co.kr/metaverse/
# 사용법: docker compose -f docker-compose.prod.yml up -d
# 환경변수: /opt/metaverse/.env 에서 로드

services:
  # React Frontend (Nginx 정적파일 서빙)
  frontend:
    image: metaverse-frontend:latest
    container_name: metaverse-frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Spring Boot Backend
  backend:
    image: metaverse-backend:latest
    container_name: metaverse-backend
    restart: unless-stopped
    expose:
      - "8086"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8086
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:
    name: biz-network
    external: true
