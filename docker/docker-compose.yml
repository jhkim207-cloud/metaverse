  #     SPRING_PROFILES_ACTIVE: dev
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: postgres
  #     DB_USER: postgres
  #     DB_PASSWORD: TNTdys1234
  #   ports:
  #     - "8083:8083"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  # Frontend (개발 시 주석 해제)
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: ../docker/Dockerfile.frontend
  #   container_name: biz-frontend
