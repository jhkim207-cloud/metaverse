# 인증 Context 모듈
name: auth-context
version: "1.0.0"
category: frontend
description: React Context 기반 인증 상태 관리

# 출처 정보
source:
  repository: BizPlatform
  path: frontend/src/contexts/

# 포함 파일
files:
  - path: contexts/AuthContext.tsx
    description: 인증 Context Provider
  - path: hooks/useAuth.ts
    description: 인증 훅
  - path: types/auth.types.ts
    description: 인증 관련 타입
  - path: pages/LoginPage.tsx
    description: 로그인 페이지
  - path: components/ProtectedRoute.tsx
    description: 인증 필요 라우트 가드

# 의존성
dependencies:
  - "react-router-dom"
  - "jwt-decode"

# Context 구조
contextStructure:
  state:
    - name: user
      type: User | null
      description: 현재 로그인 사용자
    - name: isAuthenticated
      type: boolean
      description: 인증 여부
    - name: isLoading
      type: boolean
      description: 인증 상태 확인 중
    - name: roles
      type: string[]
      description: 사용자 역할 목록
  actions:
    - name: login
      params: "(credentials: LoginRequest) => Promise<void>"
      description: 로그인
    - name: logout
      params: "() => void"
      description: 로그아웃
    - name: refreshToken
      params: "() => Promise<void>"
      description: 토큰 갱신

# 구현 코드
implementation: |
  // AuthContext.tsx
  interface AuthContextType {
    user: User | null;
    isAuthenticated: boolean;
    isLoading: boolean;
    login: (credentials: LoginRequest) => Promise<void>;
    logout: () => void;
  }

  const AuthContext = createContext<AuthContextType | undefined>(undefined);

  export function AuthProvider({ children }: { children: ReactNode }) {
    const [user, setUser] = useState<User | null>(null);
    const [isLoading, setIsLoading] = useState(true);

    useEffect(() => {
      const token = localStorage.getItem('accessToken');
      if (token) {
        validateToken(token);
      } else {
        setIsLoading(false);
      }
    }, []);

    const login = async (credentials: LoginRequest) => {
      const response = await api.post<AuthResponse>('/api/v1/auth/login', credentials);
      localStorage.setItem('accessToken', response.data.accessToken);
      localStorage.setItem('refreshToken', response.data.refreshToken);
      setUser(response.data.user);
    };

    const logout = () => {
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      setUser(null);
    };

    return (
      <AuthContext.Provider value={{
        user,
        isAuthenticated: !!user,
        isLoading,
        login,
        logout
      }}>
        {children}
      </AuthContext.Provider>
    );
  }

  // useAuth.ts
  export function useAuth() {
    const context = useContext(AuthContext);
    if (!context) {
      throw new Error('useAuth must be used within AuthProvider');
    }
    return context;
  }

# 사용 예시
usage:
  provider: |
    // App.tsx
    function App() {
      return (
        <AuthProvider>
          <Router>
            <Routes>
              <Route path="/login" element={<LoginPage />} />
              <Route element={<ProtectedRoute />}>
                <Route path="/dashboard" element={<Dashboard />} />
              </Route>
            </Routes>
          </Router>
        </AuthProvider>
      );
    }

  component: |
    // 컴포넌트에서 사용
    function Header() {
      const { user, logout } = useAuth();
      return (
        <header>
          <span>{user?.name}</span>
          <button onClick={logout}>로그아웃</button>
        </header>
      );
    }

  protectedRoute: |
    // ProtectedRoute.tsx
    function ProtectedRoute() {
      const { isAuthenticated, isLoading } = useAuth();
      const location = useLocation();

      if (isLoading) return <LoadingSpinner />;

      if (!isAuthenticated) {
        return <Navigate to="/login" state={{ from: location }} replace />;
      }

      return <Outlet />;
    }

# 토큰 관리
tokenManagement:
  storage: localStorage
  accessToken:
    key: "accessToken"
    expiry: "30분"
  refreshToken:
    key: "refreshToken"
    expiry: "7일"
  autoRefresh: true
  refreshThreshold: "5분 전"

# 이식 시 수정 사항
migration:
  notes:
    - API 엔드포인트 경로 확인 (/api/v1/auth/*)
    - 토큰 저장 방식 검토 (localStorage vs httpOnly Cookie)
    - 역할 기반 접근 제어 필요 시 roles 처리 추가
    - 자동 로그아웃 시간 설정

# 보안 고려사항
security:
  - XSS 공격 대비 (httpOnly Cookie 권장)
  - CSRF 토큰 사용 검토
  - 토큰 만료 시 자동 갱신
  - 로그아웃 시 서버에도 토큰 무효화 요청

tags:
  - react
  - context
  - authentication
  - state-management
