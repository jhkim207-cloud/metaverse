# 테마 Context 모듈
name: theme-context
version: "1.0.0"
category: frontend
description: 다크모드 지원 테마 상태 관리

# 출처 정보
source:
  repository: BizPlatform
  path: frontend/src/contexts/

# 포함 파일
files:
  - path: contexts/ThemeContext.tsx
    description: 테마 Context Provider
  - path: hooks/useTheme.ts
    description: 테마 훅
  - path: components/ThemeToggle.tsx
    description: 테마 토글 버튼

# 의존성
dependencies: []

# Context 구조
contextStructure:
  state:
    - name: theme
      type: "'light' | 'dark'"
      description: 현재 테마
    - name: isDark
      type: boolean
      description: 다크모드 여부
  actions:
    - name: toggleTheme
      params: "() => void"
      description: 테마 토글
    - name: setTheme
      params: "(theme: 'light' | 'dark') => void"
      description: 테마 설정

# 구현 코드
implementation: |
  // ThemeContext.tsx
  type Theme = 'light' | 'dark';

  interface ThemeContextType {
    theme: Theme;
    isDark: boolean;
    toggleTheme: () => void;
    setTheme: (theme: Theme) => void;
  }

  const ThemeContext = createContext<ThemeContextType | undefined>(undefined);

  export function ThemeProvider({ children }: { children: ReactNode }) {
    const [theme, setThemeState] = useState<Theme>(() => {
      // 저장된 테마 또는 시스템 설정
      const saved = localStorage.getItem('theme') as Theme;
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches
        ? 'dark'
        : 'light';
    });

    useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }, [theme]);

    // 시스템 테마 변경 감지
    useEffect(() => {
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      const handler = (e: MediaQueryListEvent) => {
        if (!localStorage.getItem('theme')) {
          setThemeState(e.matches ? 'dark' : 'light');
        }
      };
      mediaQuery.addEventListener('change', handler);
      return () => mediaQuery.removeEventListener('change', handler);
    }, []);

    const toggleTheme = () => {
      setThemeState(prev => prev === 'light' ? 'dark' : 'light');
    };

    const setTheme = (newTheme: Theme) => {
      setThemeState(newTheme);
    };

    return (
      <ThemeContext.Provider value={{
        theme,
        isDark: theme === 'dark',
        toggleTheme,
        setTheme
      }}>
        {children}
      </ThemeContext.Provider>
    );
  }

  // useTheme.ts
  export function useTheme() {
    const context = useContext(ThemeContext);
    if (!context) {
      throw new Error('useTheme must be used within ThemeProvider');
    }
    return context;
  }

# CSS 변수 연동
cssVariables: |
  /* index.css */
  :root {
    --bg: #eef2f6;
    --panel: #ffffff;
    --text: #1e293b;
    --text-secondary: #475569;
    --primary: #3b82f6;
    --border: #e2e8f0;
  }

  [data-theme="dark"] {
    --bg: #0f172a;
    --panel: #1e293b;
    --text: #f8fafc;
    --text-secondary: #cbd5e1;
    --primary: #60a5fa;
    --border: #334155;
  }

# 사용 예시
usage:
  provider: |
    // App.tsx
    function App() {
      return (
        <ThemeProvider>
          <AuthProvider>
            <Router>
              {/* ... */}
            </Router>
          </AuthProvider>
        </ThemeProvider>
      );
    }

  toggle: |
    // ThemeToggle.tsx
    function ThemeToggle() {
      const { isDark, toggleTheme } = useTheme();
      return (
        <button
          onClick={toggleTheme}
          aria-label={isDark ? '라이트 모드로 전환' : '다크 모드로 전환'}
        >
          {isDark ? <SunIcon /> : <MoonIcon />}
        </button>
      );
    }

  conditional: |
    // 조건부 스타일링
    function Card() {
      const { isDark } = useTheme();
      return (
        <div className={isDark ? 'card-dark' : 'card-light'}>
          {/* CSS 변수 사용 권장 */}
        </div>
      );
    }

# 테마 저장
storage:
  key: "theme"
  location: localStorage
  fallback: system preference

# 이식 시 수정 사항
migration:
  notes:
    - CSS 변수가 index.css에 정의되어 있어야 함
    - data-theme 속성이 html/body에 적용되어야 함
    - 모든 색상을 CSS 변수로 참조하도록 컴포넌트 수정

# 접근성
accessibility:
  - 시스템 설정 자동 감지
  - 토글 버튼에 aria-label 필수
  - 충분한 색상 대비 유지 (WCAG AA)
  - prefers-reduced-motion 고려

tags:
  - react
  - context
  - theme
  - dark-mode
